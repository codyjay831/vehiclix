version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: evomotors-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evomotors}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evomotors_pass}
      POSTGRES_DB: ${POSTGRES_DB:-evomotors_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evomotors -d evomotors_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: evomotors-migrate
    env_file:
      - .env.docker
    command: npx prisma db push
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evomotors-app
    ports:
      - "3002:3000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
