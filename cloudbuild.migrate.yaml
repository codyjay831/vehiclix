# Build and push the Prisma migration-only image (Dockerfile.migrate).
# Usage (from repo root):
#   gcloud builds submit --config=cloudbuild.migrate.yaml \
#     --substitutions=_REGION=us-central1,_AR_REPO=vehiclix,_TAG=$(git rev-parse --short HEAD)
#
# Trigger-friendly: set _REGION, _AR_REPO; use $SHORT_SHA or $COMMIT_SHA if your trigger provides them.

substitutions:
  _REGION: us-central1
  _AR_REPO: vehiclix
  _TAG: manual

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.migrate
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/evo-motors-migrate:${_TAG}
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/evo-motors-migrate:${_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
