name: Prisma Verification

on:
  push:
  pull_request:

jobs:
  prisma-verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vehiclix_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d vehiclix_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vehiclix_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/vehiclix_ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply checked-in migrations
        run: npx prisma migrate deploy

      - name: Verify no schema drift
        run: npx prisma migrate diff --from-schema prisma/schema.prisma --to-url "$DATABASE_URL" --exit-code
